name: TaskFerry
configs:
  Debug: debug
  Release: release
  Release-Direct: release
options:
  bundleIdPrefix: com.merimerimeri
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.8
    CODE_SIGN_STYLE: Automatic
    TASK_FERRY_CLOUDFLARE_OAUTH_CLIENT_ID: "fcb358ecbd170213ce612c27de3b4cad"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
targets:
  TaskFerry:
    type: application
    platform: macOS
    sources:
      - TaskFerry
      - path: .vendor/cloudflared/cloudflared
        optional: true
        buildPhase:
          copyFiles:
            destination: executables
      - path: .vendor/cloudflared/cloudflared-LICENSE
        optional: true
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerry
        PRODUCT_NAME: TaskFerry
        INFOPLIST_FILE: TaskFerry/Info.plist
        CODE_SIGN_ENTITLEMENTS: TaskFerry/TaskFerry.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerry.Debug
        Release-Direct:
          INFOPLIST_FILE: TaskFerry/Info-Direct.plist
          CODE_SIGN_ENTITLEMENTS: TaskFerry/TaskFerry-Direct.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPARKLE_ENABLED"
    postBuildScripts:
      - name: Sign Cloudflare connector
        basedOnDependencyAnalysis: false
        script: |
          "$SRCROOT/scripts/sign-cloudflared.sh" \
            "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/cloudflared" \
            "${EXPANDED_CODE_SIGN_IDENTITY:--}" \
            "$CONFIGURATION"
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/cloudflared
    scheme:
      archive:
        config: Release-Direct
      testTargets:
        - TaskFerryTests
  TaskFerryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TaskFerryTests
      - TaskFerry/AppState.swift
      - TaskFerry/Models/Models.swift
      - TaskFerry/Models/CloudflareModels.swift
      - TaskFerry/Models/RemoteConfiguration.swift
      - TaskFerry/Services/ReminderService.swift
      - TaskFerry/Services/ReminderOperationCoordinator.swift
      - TaskFerry/Services/CredentialStore.swift
      - TaskFerry/Services/DemoReminderService.swift
      - TaskFerry/Services/BridgeServer.swift
      - TaskFerry/Services/KeychainStore.swift
      - TaskFerry/Services/RemoteReminderService.swift
      - TaskFerry/Services/EventKitReminderService.swift
      - TaskFerry/Services/CloudflareAPIClient.swift
      - TaskFerry/Services/CloudflareOAuthClient.swift
      - TaskFerry/Services/CloudflareTunnelConnector.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerryTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: ""
