name: RemindersRemote
configs:
  Debug: debug
  Release: release
  Release-Direct: release
options:
  bundleIdPrefix: com.merimerimeri
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
targets:
  RemindersRemote:
    type: application
    platform: macOS
    sources:
      - RemindersRemote
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.RemindersRemote
        PRODUCT_NAME: TaskFerry
        INFOPLIST_FILE: RemindersRemote/Info.plist
        CODE_SIGN_ENTITLEMENTS: RemindersRemote/RemindersRemote.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.RemindersRemote.Debug
        Release-Direct:
          INFOPLIST_FILE: RemindersRemote/Info-Direct.plist
          CODE_SIGN_ENTITLEMENTS: RemindersRemote/RemindersRemote-Direct.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPARKLE_ENABLED"
    scheme:
      archive:
        config: Release-Direct
      testTargets:
        - RemindersRemoteTests
  RemindersRemoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - RemindersRemoteTests
      - RemindersRemote/Models/Models.swift
      - RemindersRemote/Services/ReminderService.swift
      - RemindersRemote/Services/DemoReminderService.swift
      - RemindersRemote/Services/BridgeServer.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.RemindersRemoteTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: ""
