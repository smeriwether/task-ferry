name: TaskFerry
configs:
  Debug: debug
  Release: release
  Release-Direct: release
options:
  bundleIdPrefix: com.merimerimeri
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.2
    CODE_SIGN_STYLE: Automatic
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.4
targets:
  TaskFerry:
    type: application
    platform: macOS
    sources:
      - TaskFerry
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerry
        PRODUCT_NAME: TaskFerry
        INFOPLIST_FILE: TaskFerry/Info.plist
        CODE_SIGN_ENTITLEMENTS: TaskFerry/TaskFerry.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerry.Debug
        Release-Direct:
          INFOPLIST_FILE: TaskFerry/Info-Direct.plist
          CODE_SIGN_ENTITLEMENTS: TaskFerry/TaskFerry-Direct.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SPARKLE_ENABLED"
    scheme:
      archive:
        config: Release-Direct
      testTargets:
        - TaskFerryTests
  TaskFerryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TaskFerryTests
      - TaskFerry/Models/Models.swift
      - TaskFerry/Services/ReminderService.swift
      - TaskFerry/Services/DemoReminderService.swift
      - TaskFerry/Services/BridgeServer.swift
      - TaskFerry/Services/KeychainStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merimerimeri.TaskFerryTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: ""
